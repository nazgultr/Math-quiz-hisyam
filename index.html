<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counting Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#8ed5f0;
    --sky2:#bfe9f5;
    --sun:#ffd764;
    --card:#ffffff;
    --ink:#3a3450;
    --pink:#ff8fb1;
    --purple:#a78bfa;
    --green:#6bcf9a;
    --orange:#ffab5e;
    --red:#ff6f6f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 55%, #e8fbe0 100%);
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    position:relative;
    overflow-x:hidden;
  }
  /* sun */
  body::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:220px; height:220px;
    background:radial-gradient(circle, var(--sun) 0%, rgba(255,215,100,0) 70%);
    border-radius:50%;
  }
  /* clouds */
  .cloud{
    position:absolute;
    background:#fff;
    border-radius:50px;
    opacity:.85;
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:50%;
  }
  .c1{ width:90px; height:32px; top:8%; left:6%; }
  .c1::before{ width:50px; height:50px; top:-24px; left:8px; }
  .c1::after{ width:36px; height:36px; top:-16px; left:46px; }
  .c2{ width:70px; height:26px; top:16%; right:12%; }
  .c2::before{ width:38px; height:38px; top:-18px; left:6px; }
  .c2::after{ width:28px; height:28px; top:-12px; left:34px; }

  .card{
    width:100%;
    max-width:600px;
    background:var(--card);
    border-radius:28px;
    padding:26px 24px 30px;
    box-shadow:0 24px 60px rgba(60,50,110,.25);
    position:relative;
    z-index:1;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  h1{
    font-family:'Baloo 2', cursive;
    font-size:1.5rem;
    margin:0;
    color:var(--purple);
  }
  .score{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1rem;
    background:var(--green);
    color:#fff;
    padding:6px 14px;
    border-radius:20px;
    white-space:nowrap;
  }

  .trail-track{
    height:12px;
    border-radius:8px;
    background:#eef1fb;
    overflow:hidden;
    margin-bottom:6px;
  }
  .trail-fill{
    height:100%;
    background:linear-gradient(90deg, var(--orange), var(--pink));
    width:0%;
    transition:width .35s ease;
    border-radius:8px;
  }
  .q-label{
    font-size:.85rem;
    color:#8a86a0;
    margin-bottom:16px;
    font-weight:700;
  }

  .stage{
    text-align:center;
    min-height:400px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .prompt{
    font-family:'Baloo 2', cursive;
    font-size:1.3rem;
    color:var(--ink);
    margin-bottom:14px;
  }

  .objects-frame{
    background:#fbf9ff;
    border:3px dashed #d9d3f5;
    border-radius:20px;
    padding:18px;
    margin-bottom:22px;
    max-width:380px;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:8px;
    justify-items:center;
    align-items:center;
  }
  .objects-frame span{
    font-size:2.4rem;
    line-height:1;
  }

  .options{
    width:100%;
    max-width:380px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .opt{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1.8rem;
    color:#fff;
    border:none;
    border-radius:16px;
    padding:16px 10px;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15), 0 8px 16px rgba(0,0,0,.12);
    transition:transform .1s ease, box-shadow .1s ease, filter .15s ease;
  }
  .opt:nth-child(1){ background:var(--pink); }
  .opt:nth-child(2){ background:var(--purple); }
  .opt:nth-child(3){ background:var(--orange); }
  .opt:nth-child(4){ background:var(--green); }

  .opt:hover:not(:disabled){ transform:translateY(-2px); filter:brightness(1.05); }
  .opt:active:not(:disabled){ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
  .opt:disabled{ cursor:default; }

  .opt.correct{
    background:var(--green);
    box-shadow:0 5px 0 #3f9c6c, 0 8px 16px rgba(0,0,0,.2);
    animation:pop .3s ease;
  }
  .opt.wrong{
    background:var(--red);
    box-shadow:0 5px 0 #c94a4a, 0 8px 16px rgba(0,0,0,.2);
    animation:shake .35s ease;
  }
  .opt.reveal{
    background:var(--green);
    box-shadow:0 5px 0 #3f9c6c, 0 8px 16px rgba(0,0,0,.2);
  }

  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.1);} 100%{transform:scale(1);} }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .feedback{
    min-height:26px;
    margin-top:18px;
    font-family:'Baloo 2', cursive;
    font-size:1.15rem;
    color:var(--purple);
  }

  .nextbtn{
    margin-top:12px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:.95rem;
    color:#fff;
    background:var(--purple);
    border:none;
    border-radius:12px;
    padding:10px 28px;
    cursor:pointer;
    box-shadow:0 4px 0 #7c62d6;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }
  .nextbtn.show{ opacity:1; pointer-events:auto; }
  .nextbtn:active{ transform:translateY(2px); box-shadow:0 2px 0 #7c62d6; }

  .results{ text-align:center; }
  .results h2{
    font-family:'Baloo 2', cursive;
    font-size:2rem;
    margin:0 0 6px;
    color:var(--purple);
  }
  .bigscore{
    font-size:3rem;
    font-weight:900;
    margin:14px 0;
    color:var(--green);
  }
  .results p{
    color:#8a86a0;
    margin:4px 0 24px;
    font-weight:700;
  }
  .restartbtn{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1rem;
    color:#fff;
    background:var(--orange);
    border:none;
    border-radius:12px;
    padding:12px 30px;
    cursor:pointer;
    box-shadow:0 4px 0 #d97f2f;
  }
  .restartbtn:active{ transform:translateY(2px); box-shadow:0 2px 0 #d97f2f; }

  @media (max-width:420px){
    .objects-frame span{ font-size:1.9rem; }
    .opt{ font-size:1.4rem; padding:14px 8px; }
  }
</style>
</head>

    <button class="nextbtn" id="nextBtn">${current === questions.length-1 ? 'See results →' : 'Next question →'}</button>
  `;

  const optionsRow = document.getElementById('optionsRow');
  q.options.forEach((val, i)=>{
    const letter = letters[i];
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = val;
    btn.addEventListener('click', ()=> handleAnswer(letter, btn));
    optionsRow.appendChild(btn);
  });

  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
}

function handleAnswer(letter, btn){
  if(answered) return;
  answered = true;
  const q = questions[current];
  const allBtns = document.querySelectorAll('.opt');
  const feedback = document.getElementById('feedback');

  allBtns.forEach(b=> b.disabled = true);

  if(letter === q.answer){
    btn.classList.add('correct');
    score++;
    feedback.textContent = 'Yay! That\'s right! 🌟';
  } else {
    btn.classList.add('wrong');
    feedback.textContent = 'Good try! The right answer is highlighted.';
    allBtns.forEach((b,i)=>{
      if(letters[i] === q.answer) b.classList.add('reveal');
    });
  }
  updateHeader();
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){
  current++;
  if(current >= questions.length){
    renderResults();
  } else {
    renderQuestion();
  }
}

function renderResults(){
  trailFill.style.width = '100%';
  qLabel.textContent = 'All done!';
  const pct = Math.round(score/questions.length*100);
  let msg;
  if(pct === 100) msg = "Perfect counting! You're a superstar! 🏆";
  else if(pct >= 80) msg = "Great counting! You know your numbers so well! 🌟";
  else if(pct >= 60) msg = "Nice job! Keep practicing your counting! 💪";
  else msg = "Good try! Let's count together some more! 📚";

  stage.innerHTML = `
    <div class="results">
      <h2>All Done!</h2>
      <div class="bigscore">${score} / ${questions.length}</div>
      <p>${pct}% correct — ${msg}</p>
      <button class="restartbtn" id="restartBtn">Play again</button>
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    current = 0;
    score = 0;
    renderQuestion();
  });
}

renderQuestion();
</script>
</body>
</html>
