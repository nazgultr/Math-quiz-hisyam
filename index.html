<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counting on the Road</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#8ed5f0;
    --sky2:#bfe9f5;
    --sun:#ffd764;
    --card:#ffffff;
    --ink:#3a3450;
    --pink:#ff8fb1;
    --purple:#a78bfa;
    --green:#6bcf9a;
    --orange:#ffab5e;
    --red:#ff6f6f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 55%, #e8fbe0 100%);
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    position:relative;
    overflow-x:hidden;
  }
  /* sun */
  body::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:220px; height:220px;
    background:radial-gradient(circle, var(--sun) 0%, rgba(255,215,100,0) 70%);
    border-radius:50%;
  }
  /* clouds */
  .cloud{
    position:absolute;
    background:#fff;
    border-radius:50px;
    opacity:.85;
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:50%;
  }
  .c1{ width:90px; height:32px; top:8%; left:6%; }
  .c1::before{ width:50px; height:50px; top:-24px; left:8px; }
  .c1::after{ width:36px; height:36px; top:-16px; left:46px; }
  .c2{ width:70px; height:26px; top:16%; right:12%; }
  .c2::before{ width:38px; height:38px; top:-18px; left:6px; }
  .c2::after{ width:28px; height:28px; top:-12px; left:34px; }

  .card{
    width:100%;
    max-width:600px;
    background:var(--card);
    border-radius:28px;
    padding:26px 24px 30px;
    box-shadow:0 24px 60px rgba(60,50,110,.25);
    position:relative;
    z-index:1;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  h1{
    font-family:'Baloo 2', cursive;
    font-size:1.5rem;
    margin:0;
    color:var(--purple);
  }
  .score{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1rem;
    background:var(--green);
    color:#fff;
    padding:6px 14px;
    border-radius:20px;
    white-space:nowrap;
  }

  .trail-track{
    height:12px;
    border-radius:8px;
    background:#eef1fb;
    overflow:hidden;
    margin-bottom:6px;
  }
  .trail-fill{
    height:100%;
    background:linear-gradient(90deg, var(--orange), var(--pink));
    width:0%;
    transition:width .35s ease;
    border-radius:8px;
  }
  .q-label{
    font-size:.85rem;
    color:#8a86a0;
    margin-bottom:16px;
    font-weight:700;
  }

  .stage{
    text-align:center;
    min-height:400px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .prompt{
    font-family:'Baloo 2', cursive;
    font-size:1.3rem;
    color:var(--ink);
    margin-bottom:14px;
  }

  .objects-frame{
    background:#fbf9ff;
    border:3px dashed #d9d3f5;
    border-radius:20px;
    padding:18px;
    margin-bottom:22px;
    max-width:380px;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:8px;
    justify-items:center;
    align-items:center;
  }
  .objects-frame span{
    font-size:2.4rem;
    line-height:1;
  }

  .options{
    width:100%;
    max-width:380px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .opt{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1.8rem;
    color:#fff;
    border:none;
    border-radius:16px;
    padding:16px 10px;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15), 0 8px 16px rgba(0,0,0,.12);
    transition:transform .1s ease, box-shadow .1s ease, filter .15s ease;
  }
  .opt{
    background:#4a90d9;
  }

  .opt:hover:not(:disabled){ transform:translateY(-2px); filter:brightness(1.05); }
  .opt:active:not(:disabled){ transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
  .opt:disabled{ cursor:default; }

  .opt.correct{
    background:var(--green);
    box-shadow:0 5px 0 #3f9c6c, 0 8px 16px rgba(0,0,0,.2);
    animation:pop .3s ease;
  }
  .opt.wrong{
    background:var(--red);
    box-shadow:0 5px 0 #c94a4a, 0 8px 16px rgba(0,0,0,.2);
    animation:shake .35s ease;
  }
  .opt.reveal{
    background:var(--green);
    box-shadow:0 5px 0 #3f9c6c, 0 8px 16px rgba(0,0,0,.2);
  }

  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.1);} 100%{transform:scale(1);} }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .feedback{
    min-height:26px;
    margin-top:18px;
    font-family:'Baloo 2', cursive;
    font-size:1.15rem;
    color:var(--purple);
  }
  .result-icon{
    font-size:3rem;
    line-height:1;
    margin-bottom:4px;
  }

  .train-reward{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .train-scene{
    position:relative;
    width:100%;
    max-width:460px;
    height:190px;
    overflow:hidden;
    border-radius:16px;
    background:linear-gradient(180deg,#bfe9f7 0%,#eaf7ff 70%,#eaf7ff 100%);
    margin:6px 0 14px;
  }
  .tsc-cloud{
    position:absolute;
    background:#fff;
    border-radius:30px;
    opacity:.9;
  }
  .tsc-cloud::before, .tsc-cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:50%;
  }
  .tsc-cloud.c1{ width:50px; height:18px; top:14px; left:20px; }
  .tsc-cloud.c1::before{ width:26px; height:26px; top:-12px; left:4px; }
  .tsc-cloud.c1::after{ width:20px; height:20px; top:-8px; left:26px; }
  .tsc-cloud.c2{ width:60px; height:20px; top:26px; right:30px; }
  .tsc-cloud.c2::before{ width:30px; height:30px; top:-14px; left:6px; }
  .tsc-cloud.c2::after{ width:22px; height:22px; top:-9px; left:32px; }

  .tsc-station{
    position:absolute;
    right:14px;
    bottom:38px;
    width:110px;
    z-index:1;
  }
  .tsc-roof{
    width:100%;
    height:16px;
    background:#8a5cf6;
    border-radius:6px 6px 0 0;
  }
  .tsc-sign{
    background:#fff;
    color:#3a3450;
    font-family:'Baloo 2',cursive;
    font-size:.6rem;
    font-weight:700;
    text-align:center;
    letter-spacing:1px;
    padding:2px 0;
  }
  .tsc-platform{
    width:100%;
    height:34px;
    background:#d8c9f0;
    border-top:4px solid #8a5cf6;
  }

  .tsc-track{
    position:absolute;
    left:0; right:0;
    bottom:30px;
    height:6px;
    background:repeating-linear-gradient(90deg, #444 0 14px, #777 14px 18px);
  }

  .tsc-train-wrap{
    position:absolute;
    bottom:24px;
    left:-260px;
    width:230px;
    animation:trainMove 7s linear infinite;
  }
  .tsc-train-wrap svg{ width:100%; height:auto; display:block; }

  @keyframes trainMove{
    0%{ left:-260px; }
    100%{ left:100%; }
  }

  .puff{ transform-origin:center; }
  .p1{ animation:puff 1.6s ease-out infinite; }
  .p2{ animation:puff 1.6s ease-out infinite .5s; }
  .p3{ animation:puff 1.6s ease-out infinite 1s; }
  @keyframes puff{
    0%{ transform:translateY(0) scale(.6); opacity:.9; }
    100%{ transform:translateY(-30px) scale(1.5); opacity:0; }
  }

  .train-reward h2{
    font-family:'Baloo 2', cursive;
    color:var(--purple);
    margin:6px 0;
  }
  .train-reward p{
    color:#8a86a0;
    font-weight:700;
    margin:0 0 18px;
  }

  .nextbtn{
    margin-top:12px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:.95rem;
    color:#fff;
    background:var(--purple);
    border:none;
    border-radius:12px;
    padding:10px 28px;
    cursor:pointer;
    box-shadow:0 4px 0 #7c62d6;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }
  .nextbtn.show{ opacity:1; pointer-events:auto; }
  .nextbtn:active{ transform:translateY(2px); box-shadow:0 2px 0 #7c62d6; }

  .results{ text-align:center; }
  .results h2{
    font-family:'Baloo 2', cursive;
    font-size:2rem;
    margin:0 0 6px;
    color:var(--purple);
  }
  .bigscore{
    font-size:3rem;
    font-weight:900;
    margin:14px 0;
    color:var(--green);
  }
  .results p{
    color:#8a86a0;
    margin:4px 0 24px;
    font-weight:700;
  }
  .restartbtn{
    font-family:'Nunito',sans-serif;
    font-weight:900;
    font-size:1rem;
    color:#fff;
    background:var(--orange);
    border:none;
    border-radius:12px;
    padding:12px 30px;
    cursor:pointer;
    box-shadow:0 4px 0 #d97f2f;
  }
  .restartbtn:active{ transform:translateY(2px); box-shadow:0 2px 0 #d97f2f; }

  @media (max-width:420px){
    .objects-frame span{ font-size:1.9rem; }
    .opt{ font-size:1.4rem; padding:14px 8px; }
  }
</style>
</head>

</div>

let current = 0;
let score = 0;
let answered = false;
let blockCorrect = 0;
let trainRewardIndex = 0;

const stage = document.getElementById('stage');
const scoreDisplay = document.getElementById('scoreDisplay');
const trailFill = document.getElementById('trailFill');
const qLabel = document.getElementById('qLabel');
const letters = ['A','B','C','D'];

function updateHeader(){
  scoreDisplay.textContent = 'Score: ' + score;
  trailFill.style.width = (current/questions.length*100) + '%';
  qLabel.textContent = 'Question ' + (current+1) + ' of ' + questions.length;
}

function renderQuestion(){
  answered = false;
  const q = questions[current];
  updateHeader();

  const objectsHTML = Array(q.count).fill(`<span>${q.emoji}</span>`).join('');

  stage.innerHTML = `
    <div class="prompt">How many ${q.label} are there?</div>
    <div class="objects-frame">${objectsHTML}</div>
    <div class="options" id="optionsRow"></div>
    <div class="feedback" id="feedback"></div>
    <button class="nextbtn" id="nextBtn">${current === questions.length-1 ? 'See results →' : 'Next question →'}</button>
  `;

  const optionsRow = document.getElementById('optionsRow');
  q.options.forEach((val, i)=>{
    const letter = letters[i];
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = val;
    btn.addEventListener('click', ()=> handleAnswer(letter, btn));
    optionsRow.appendChild(btn);
  });

  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
}

function handleAnswer(letter, btn){
  if(answered) return;
  answered = true;
  const q = questions[current];
  const allBtns = document.querySelectorAll('.opt');
  const feedback = document.getElementById('feedback');

  allBtns.forEach(b=> b.disabled = true);

  if(letter === q.answer){
    btn.classList.add('correct');
    score++;
    blockCorrect++;
    feedback.innerHTML = '<div class="result-icon">👍</div><div>Yay! That\'s right!</div>';
  } else {
    btn.classList.add('wrong');
    feedback.innerHTML = '<div class="result-icon">❌</div><div>Good try! The right answer is highlighted.</div>';
    allBtns.forEach((b,i)=>{
      if(letters[i] === q.answer) b.classList.add('reveal');
    });
  }
  updateHeader();
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){
  current++;
  if(current >= questions.length){
    renderResults();
  } else if(current % 10 === 0){
    const perfectBlock = (blockCorrect === 10);
    blockCorrect = 0;
    if(perfectBlock){
      renderTrainReward();
    } else {
      renderQuestion();
    }
  } else {
    renderQuestion();
  }
}

// Distinct train designs so each reward looks different
const trainVariants = [
  { body:'#e8483a', cab:'#ffe08a', stripe:'#ffffff', wheel:'#2b2b2b', smoke:'#f2f2f2', name:'Red Express' },
  { body:'#2f9e5c', cab:'#dff5e6', stripe:'#ffd54f', wheel:'#1e1e1e', smoke:'#eef7ee', name:'Green Steamer' },
  { body:'#3a7bd5', cab:'#eaf3ff', stripe:'#ffffff', wheel:'#242424', smoke:'#f0f4ff', name:'Blue Bullet' },
  { body:'#f2a530', cab:'#fff4de', stripe:'#7a4a1e', wheel:'#2b2b2b', smoke:'#fff7ea', name:'Sunset Freight' },
  { body:'#8a5cf6', cab:'#f1e9ff', stripe:'#ffd54f', wheel:'#242424', smoke:'#f4f0ff', name:'Purple Rocket Rail' },
  { body:'#ff7ab8', cab:'#fff0f6', stripe:'#ffffff', wheel:'#2b2b2b', smoke:'#fff3f8', name:'Pink Sakura Line' },
];

function buildTrainSVG(v){
  return `
  <svg viewBox="0 0 460 170" xmlns="http://www.w3.org/2000/svg">
    <!-- coal car -->
    <rect x="330" y="70" width="90" height="55" rx="8" fill="${v.body}" opacity="0.85"/>
    <circle cx="352" cy="135" r="16" fill="${v.wheel}"/>
    <circle cx="398" cy="135" r="16" fill="${v.wheel}"/>
    <!-- passenger car -->
    <rect x="185" y="55" width="130" height="75" rx="10" fill="${v.body}"/>
    <rect x="200" y="70" width="28" height="26" rx="4" fill="${v.cab}"/>
    <rect x="240" y="70" width="28" height="26" rx="4" fill="${v.cab}"/>
    <rect x="280" y="70" width="28" height="26" rx="4" fill="${v.cab}"/>
    <rect x="185" y="118" width="130" height="8" fill="${v.stripe}"/>
    <circle cx="210" cy="140" r="17" fill="${v.wheel}"/>
    <circle cx="255" cy="140" r="17" fill="${v.wheel}"/>
    <circle cx="295" cy="140" r="17" fill="${v.wheel}"/>
    <!-- engine -->
    <rect x="40" y="40" width="130" height="90" rx="14" fill="${v.body}"/>
    <rect x="55" y="55" width="40" height="34" rx="6" fill="${v.cab}"/>
    <rect x="40" y="112" width="130" height="10" fill="${v.stripe}"/>
    <rect x="20" y="95" width="30" height="35" rx="6" fill="${v.body}"/>
    <circle cx="70" cy="145" r="19" fill="${v.wheel}"/>
    <circle cx="120" cy="145" r="19" fill="${v.wheel}"/>
    <circle cx="150" cy="145" r="19" fill="${v.wheel}"/>
    <!-- chimney + smoke -->
    <rect x="145" y="15" width="18" height="30" rx="4" fill="${v.wheel}"/>
    <circle class="puff p1" cx="154" cy="8" r="9" fill="${v.smoke}"/>
    <circle class="puff p2" cx="154" cy="8" r="7" fill="${v.smoke}"/>
    <circle class="puff p3" cx="154" cy="8" r="11" fill="${v.smoke}"/>
  </svg>`;
}

function renderTrainReward(){
  const milestone = current;
  const variant = trainVariants[trainRewardIndex % trainVariants.length];
  trainRewardIndex++;

  stage.innerHTML = `
    <div class="train-reward">
      <div class="train-scene">
        <div class="tsc-sky"></div>
        <div class="tsc-cloud c1"></div>
        <div class="tsc-cloud c2"></div>
        <div class="tsc-station">
          <div class="tsc-roof"></div>
          <div class="tsc-sign">STATION</div>
          <div class="tsc-platform"></div>
        </div>
        <div class="tsc-track"></div>
        <div class="tsc-train-wrap">${buildTrainSVG(variant)}</div>
      </div>
      <h2>${milestone} Questions Done!</h2>
      <p>Perfect 10! You unlocked the <strong>${variant.name}</strong> 🎉</p>
      <button class="nextbtn show" id="continueBtn">Continue →</button>
    </div>
  `;
  document.getElementById('continueBtn').addEventListener('click', renderQuestion);
}

function renderResults(){
  trailFill.style.width = '100%';
  qLabel.textContent = 'All done!';
  const pct = Math.round(score/questions.length*100);
  let msg;
  if(pct === 100) msg = "Perfect counting! You're a superstar! 🏆";
  else if(pct >= 80) msg = "Great counting! You know your numbers so well! 🌟";
  else if(pct >= 60) msg = "Nice job! Keep practicing your counting! 💪";
  else msg = "Good try! Let's count together some more! 📚";

  stage.innerHTML = `
    <div class="results">
      <h2>All Done!</h2>
      <div class="bigscore">${score} / ${questions.length}</div>
      <p>${pct}% correct — ${msg}</p>
      <button class="restartbtn" id="restartBtn">Play again</button>
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    current = 0;
    score = 0;
    renderQuestion();
  });
}

renderQuestion();
